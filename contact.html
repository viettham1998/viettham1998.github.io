<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Document</title>
	<style>
		body {

		}

		h1 {
			color: blue;
			text-align: center;
		}

		p {
			font-family: verdana;
			font-size: 20px;
		}
		input[type=title] {
			width: 100%;
			background-color: #000000;
			color: white;
			padding: 14px 20px;
			margin: 8px 0;
			border: none;
			border-radius: 4px;
			cursor: pointer;
		}
		input[type=title]:hover {
			background-color: #000000;
		}
		input[type=text], select {
			width: 100%;
			padding: 12px 20px;
			margin: 8px 0;
			display: inline-block;
			border: 1px solid #ccc;
			border-radius: 4px;
			box-sizing: border-box;
		}
		input[type=longtext]{
			width: 100%;
			padding: 40px 20px;
			margin: 8px 0;
			display: inline-block;
			border: 1px solid #ccc;
			border-radius: 4px;
			box-sizing: border-box;
		}

		input[type=submit] {
			width: 100%;
			background-color: #000000;
			color: white;
			padding: 14px 20px;
			margin: 8px 0;
			border: none;
			border-radius: 4px;
			cursor: pointer;
		}

		input[type=submit]:hover {
			background-color: #45a049;
		}

		div {
			border-radius: 5px;
			padding: 20px;
		}

		.zero{
			display: block;
			text-align: center;
			background: black;
			color: white;
			font-size: 32px;
			height: 36px;
			line-height: 36px; 
		}

	</style>
</head>
<body>
